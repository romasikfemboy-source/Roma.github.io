<!DOCTYPE html>
<html>
<head>
  <title>Для тебя ❤️</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to top, #1e0033, #660066);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      flex-direction: column;
    }

    h1 {
      font-size: 60px;
      text-shadow: 0 0 20px pink;
      animation: glow 2s infinite alternate;
      display: none;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 30px;
      background: hotpink;
      color: white;
      cursor: pointer;
      box-shadow: 0 0 20px pink;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px red;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px white; }
      to { text-shadow: 0 0 30px red; }
    }

    .heart {
      position: absolute;
      color: pink;
      animation: fall linear infinite;
    }

    @keyframes fall {
      from { transform: translateY(-10vh); }
      to { transform: translateY(110vh); }
    }
  </style>
</head>
<body>

<button onclick="startLove()">Нажми сюда 💖</button>
<h1 id="loveText">Я тебя люблю ❤️</h1>

<script>
  function startLove() {
    document.querySelector("button").style.display = "none";
    document.getElementById("loveText").style.display = "block";
    setInterval(createHeart, 300);
  }

  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }
</script>

</body>
</html>
